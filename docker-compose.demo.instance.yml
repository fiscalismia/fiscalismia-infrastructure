volumes:
  database-v:
    name: "database-v"

services:
  # to connect to db in attached docker shell, (RUN apk add --no-cache postgresql-client):
  # psql -U $POSTGRES_USER -d $POSTGRES_DB -h $POSTGRES_HOST -p $POSTGRES_PORT
  # to connect from local machine, the host has to be localhost!
  # psql -U $POSTGRES_USER -d $POSTGRES_DB -h localhost -p $POSTGRES_PORT
  fiscalismia-postgres:
    image: fiscalismia-postgres:1.0.0
    container_name: fiscalismia-postgres
    build:
      context: ./database/
      dockerfile: Dockerfile
    restart: "no"
    environment:
      POSTGRES_USER: fiscalismia_api
      POSTGRES_DB: fiscalismia
      POSTGRES_PORT: 5432
      # After initial deployment, PostgreSQL's internal catalog (the pg_authid table on the persistent volume)
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      INITIAL_ADMIN_PW_FILE: /run/secrets/admin_password
    volumes:
      - database-v:/var/lib/postgresql/data
      - /usr/local/etc/fiscalismia-demo/secrets/postgres_password:/run/secrets/postgres_password:ro,z
      - /usr/local/etc/fiscalismia-demo/secrets/admin_password:/run/secrets/admin_password:ro,z
    networks:
      - demo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5432 -U fiscalismia_api -d fiscalismia"]
      start_period: 0s
      interval: 5s
      timeout: 5s
      retries: 5
    # Container Resource Usage
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.3'
    # Security hardening (minimal required permissions)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH # allows reading files regardless of permissions set
    security_opt:
      - no-new-privileges:true
    # tmpfs for temporary files
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    command: "-p 5432"

  fiscalismia-frontend:
    image: ghcr.io/fiscalismia/fiscalismia-frontend-demo:latest
    container_name: fiscalismia-frontend
    pull_policy: always
    restart: unless-stopped
    volumes:
      # The ':z' flag is required on SELinux-enabled systems (like Fedora/CentOS)
      # to relabel the host directory. This allows the container to access the
      # mounted volume by applying a shared SELinux label.
      - /usr/local/etc/fiscalismia-demo/certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro,z
      - /usr/local/etc/fiscalismia-demo/certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro,z
    networks:
      - demo-frontend-only
    ports:
      - "0.0.0.0:443:443/tcp"
    healthcheck:
      # since frontend expects proxy_protocol we can't trivially healthcheck the nginx endpoint
      test: ["CMD-SHELL", "pgrep nginx || exit 1"]
      start_period: 0s
      interval: 5s
      timeout: 5s
      retries: 5
    # Container Resource Usage
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'
    ### SECURITY HARDENING (minimal required permissions)
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      # if binding to ports < 1024 also requires the following setting on the host:
      # echo "net.ipv4.ip_unprivileged_port_start=80" | sudo tee /etc/sysctl.d/nonroot_can_bind_to_low_ports.conf
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m # set as cache directory in nginx.demo.conf

  fiscalismia-backend:
    image: ghcr.io/fiscalismia/fiscalismia-backend-demo:latest
    container_name: fiscalismia-backend
    pull_policy: always
    restart: "no" # .env file is loaded into container memory only once during deployment
    volumes:
      # The ':z' flag is required on SELinux-enabled systems (like Fedora/CentOS)
      # to relabel the host directory. This allows the container to access the
      # mounted volume by applying a shared SELinux label.
      - /usr/local/etc/fiscalismia-demo/backend/public:/fiscalismia-backend/public:z
      - /usr/local/etc/fiscalismia-demo/certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro,z
      - /usr/local/etc/fiscalismia-demo/certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro,z
      # tmpfs backed mounted RAM filesystem on the host ensures .env file in container lives in memory only
      # The host file is shredded and deleted after container health check succeeds, resulting in .env file only existing during startup
      - /usr/local/etc/fiscalismia-demo/secrets/backend.env:/run/secrets/.env:ro,z
    networks:
      - demo-network
    ports:
      - "0.0.0.0:8443:8443/tcp"
    depends_on:
      fiscalismia-postgres:
        condition: service_healthy
    healthcheck:
      # to avoid spamming the access logs only run a simple tcp healthcheck
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3002 || exit 1"]
      start_period: 0s
      interval: 5s
      timeout: 5s
      retries: 5
    # Container Resource Usage
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.2'
    ### SECURITY HARDENING (minimal required permissions)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # for changing owner to nginx of tmp directories
      - SETUID # required to set id of unpriviledged service user
      - SETGID # required to set group of unpriviledged service user
      - KILL  # Required for supervisor to signal child processes
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m # set as cache directory in nginx.demo.conf

  fiscalismia-webscraper:
    image: ghcr.io/fiscalismia/fiscalismia-webscraper-demo:latest
    container_name: fiscalismia-webscraper
    pull_policy: always
    restart: "no" # .env file is loaded into container memory only once during deployment
    volumes:
      # The ':z' flag is required on SELinux-enabled systems (like Fedora/CentOS)
      # to relabel the host directory. This allows the container to access the
      # mounted volume by applying a shared SELinux label.
      - /usr/local/etc/fiscalismia-demo/certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro,z
      - /usr/local/etc/fiscalismia-demo/certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro,z
      # tmpfs backed mounted RAM filesystem on the host ensures .env file in container lives in memory only
      # The host file is shredded and deleted after container health check succeeds, resulting in .env file only existing during startup
      - /usr/local/etc/fiscalismia-demo/secrets/webscraper.env:/run/secrets/.env:ro,z
    networks:
      - demo-webscraper-only
    ports:
      - "0.0.0.0:8444:8444/tcp"
    healthcheck:
      # to avoid spamming the access logs only run a simple tcp healthcheck
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1', 3003), timeout=3)\"" ]
      start_period: 0s
      interval: 5s
      timeout: 5s
      retries: 5
    # Container Resource Usage
    deploy:
      resources:
        limits:
          memory: 5632M
          cpus: '3.0'
        reservations:
          memory: 4800M
          cpus: '2.4'
    ### SECURITY HARDENING (minimal required permissions)
    cap_drop:
      - ALL
    cap_add:
      - CHOWN # for changing owner to nginx of tmp directories
      - SETUID # required to set id of unpriviledged service user
      - SETGID # required to set group of unpriviledged service user
      - KILL  # Required for supervisor to signal child processes
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=512m # set as cache directory in nginx.conf

  fiscalismia-healthcheck:
    image: ghcr.io/fiscalismia/fiscalismia-healthcheck-demo:latest
    container_name: fiscalismia-healthcheck
    pull_policy: always
    restart: "always"
    environment:
      HEALTHCHECK_ADDR: "0.0.0.0:8445"
    volumes:
      # The ':z' flag is required on SELinux-enabled systems (like Fedora/CentOS)
      # to relabel the host directory. This allows the container to access the
      # mounted volume by applying a shared SELinux label.
      - /usr/local/etc/fiscalismia-demo/certs/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro,z
      - /usr/local/etc/fiscalismia-demo/certs/privkey.pem:/etc/ssl/certs/privkey.pem:ro,z
    network_mode: host # required to reach other private instances and break out of the bridge network
    ports:
      - "0.0.0.0:8445:8445/tcp"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'
    ### SECURITY HARDENING (minimal required permissions)
    cap_drop:
      - ALL
    # cap_add:
      # - CHOWN # for changing owner to nginx of tmp directories
      # - SETUID # required to set id of unpriviledged service user
      # - SETGID # required to set group of unpriviledged service user
      # - KILL  # Required for supervisor to signal child processes
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m

# since nftables firewall blocks all port forwarding except in specific podman network cidrs, all containers must live in a network
# The configured CIDR allows these networks: 10.89.0.0/24 | 10.89.1.0/24 | 10.89.2.0/24 | 10.89.3.0/24
networks:
  demo-network:
    name: demo-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.89.0.0/24
          gateway: 10.89.0.1
  demo-frontend-only:
    name: demo-frontend-only
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.89.1.0/24
          gateway: 10.89.1.1
  demo-webscraper-only:
    name: demo-webscraper-only
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.89.2.0/24
          gateway: 10.89.2.1
