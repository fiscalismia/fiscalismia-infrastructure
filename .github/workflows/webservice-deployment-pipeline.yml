name: Webservice Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      deploy_demo:
        description: 'Deploy DEMO Backend & FastAPI & Frontend & local PostgreSQL?'
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: 'Deploy BACKEND & FastAPI on Production Instance?'
        required: false
        default: false
        type: boolean
      deploy_frontend:
        description: 'Deploy FRONTEND on Production Instance?'
        required: false
        default: false
        type: boolean

jobs:
  webservice-deployment:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # for aws OIDC STS tokens to work
      contents: read
      actions: read

    steps:

    - name: Checkout Fiscalismia-Infrastructure Repository
      uses: actions/checkout@v5
      # https://github.com/actions/checkout
      with:
        path: fiscalismia-infrastructure

    - name: Checkout Fiscalismia-Frontend Repository
      uses: actions/checkout@v5
      # https://github.com/actions/checkout
      with:
        repository: fiscalismia/fiscalismia-frontend
        path: fiscalismia-frontend

    - name: Checkout Fiscalismia-Backend Repository
      uses: actions/checkout@v5
      # https://github.com/actions/checkout
      with:
        repository: fiscalismia/fiscalismia-backend
        path: fiscalismia-backend

    - name: Checkout Fiscalismia-Webscraper Repository
      uses: actions/checkout@v5
      # https://github.com/actions/checkout
      with:
        repository: fiscalismia/fiscalismia-webscraper
        path: fiscalismia-webscraper

    - name: Configure AWS Credentials with OIDC JWT Token for STS Access to Hcloud Backend Role
      uses: aws-actions/configure-aws-credentials@v5.1.1
      # https://github.com/aws-actions/configure-aws-credentials
      with:
        role-to-assume: arn:aws:iam::010928217051:role/OpenID_Connect_GithubActions_TerraformHcloudDeploymentAccess
        role-session-name: HcloudWebserviceDeployment_STSSession
        aws-region: ${{ vars.AWS_REGION }}

    - name: Query SSH private keys for Hcloud servers from AWS Secrets Manager
      env:
        SSH_KEY_SECRET_ID: fiscalismia-ssh-keys-hcloud
        MASTER_PRIVATE_KEY: fiscalismia-infrastructure-master-key-hcloud
        DEMO_PRIVATE_KEY: fiscalismia-demo-instance-key-hcloud
        PRODUCTION_PRIVATE_KEY: fiscalismia-production-instances-key-hcloud
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh/

        echo "Starting ssh-agent and exporting environment variables"
        eval "$(ssh-agent -s)"
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

        query_aws_plaintext_secret() {
          echo "Querying $1 key from AWS Secret $SSH_KEY_SECRET_ID"
          # INFO: sed escapes and replaces literal newlines
          # since the ssh-keys are saved as is without json escapes
          aws secretsmanager get-secret-value \
            --secret-id $SSH_KEY_SECRET_ID \
            --output text \
            --query SecretString \
            | sed ':a;N;$!ba;s/\n/\\n/g' \
            | jq -r --arg key "$1" '.[$key]' \
            | ssh-add - > /dev/null 2>&1
        }

        query_aws_plaintext_secret ${MASTER_PRIVATE_KEY}
        query_aws_plaintext_secret ${DEMO_PRIVATE_KEY}
        query_aws_plaintext_secret ${PRODUCTION_PRIVATE_KEY}

    - name: Extract Hcloud Server IP Adresses from Remote State
      env:
        S3_BUCKET: hangrybear-tf-backend-state-bucket
        S3_PREFIX: fiscalismia-infrastructure/hcloud
        S3_KEY: state.tfstate
      run : |
        aws s3 cp s3://${S3_BUCKET}/${S3_PREFIX}/${S3_KEY} .

        bastion_ip=$(cat state.tfstate | jq -r .outputs.fiscalismia_bastion_host_ipv4.value )
        demo_ip=$(cat state.tfstate | jq -r .outputs.fiscalismia_demo_private_ipv4.value )
        front_ip=$(cat state.tfstate | jq -r .outputs.fiscalismia_frontend_private_ipv4.value )
        back_ip=$(cat state.tfstate | jq -r .outputs.fiscalismia_backend_private_ipv4.value )

        echo "BASTION_HOST_PUBLIC_IP=$bastion_ip" >> $GITHUB_ENV
        echo "DEMO_INSTANCE_PRIVATE_IP=$demo_ip" >> $GITHUB_ENV
        echo "FRONTEND_INSTANCE_PRIVATE_IP=$front_ip" >> $GITHUB_ENV
        echo "BACKEND_INSTANCE_PRIVATE_IP=$back_ip" >> $GITHUB_ENV

    - name: Create SSH Config for Bastion-Host ProxyJump
      run: |
        cat << EOF > ~/.ssh/config
        Host bastion-host
            HostName $BASTION_HOST_PUBLIC_IP
            User root
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

        Host demo
            HostName $DEMO_INSTANCE_PRIVATE_IP
            User root
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion-host

        Host frontend
            HostName $FRONTEND_INSTANCE_PRIVATE_IP
            User root
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion-host

        Host backend
            HostName $BACKEND_INSTANCE_PRIVATE_IP
            User root
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion-host
        EOF

        chmod 600 ~/.ssh/config

    #     __   ___        __      __   ___  __        __             ___      ___
    #    |  \ |__   |\/| /  \    |  \ |__  |__) |    /  \ \ /  |\/| |__  |\ |  |
    #    |__/ |___  |  | \__/    |__/ |___ |    |___ \__/  |   |  | |___ | \|  |

    - name: Prepare DEMO Workspace
      if: inputs.deploy_demo == true
      env:
        REMOTE_DEMO_DIR: /usr/local/etc/fiscalismia-demo
      run: |
        echo "REMOTE_DEMO_DIR=$REMOTE_DEMO_DIR" >> $GITHUB_ENV
        echo "FRONTEND_DIR=${GITHUB_WORKSPACE}/fiscalismia-frontend" >> $GITHUB_ENV
        echo "BACKEND_DIR=${GITHUB_WORKSPACE}/fiscalismia-backend" >> $GITHUB_ENV
        echo "FASTAPI_DIR=${GITHUB_WORKSPACE}/fiscalismia-webscraper" >> $GITHUB_ENV
        echo "INFRA_DIR=${GITHUB_WORKSPACE}/fiscalismia-infrastructure" >> $GITHUB_ENV

    - name: Initialize DEMO Instance
      if: inputs.deploy_demo == true
      run: |
        ssh demo << EOF
        mkdir -p ${REMOTE_DEMO_DIR}
        mkdir -p ${REMOTE_DEMO_DIR}/database
        mkdir -p ${REMOTE_DEMO_DIR}/frontend
        mkdir -p ${REMOTE_DEMO_DIR}/backend
        mkdir -p ${REMOTE_DEMO_DIR}/backend/public
        mkdir -p ${REMOTE_DEMO_DIR}/fastapi
        mkdir -p ${REMOTE_DEMO_DIR}/certs
        mkdir -p ${REMOTE_DEMO_DIR}/scripts

        # copy ssl certificates to deployment directory
        cp /etc/letsencrypt/live/demo.fiscalismia.com/fullchain.pem ${REMOTE_DEMO_DIR}/certs/
        cp /etc/letsencrypt/live/demo.fiscalismia.com/privkey.pem ${REMOTE_DEMO_DIR}/certs/
        # change cert ownership to read only owned by unpriviledged nginx userid and groupid
        chown -R 101:101 ${REMOTE_DEMO_DIR}/certs/
        chmod -R 444 ${REMOTE_DEMO_DIR}/certs/*.pem
        EOF

    - name: Secure Copy Dependencies to DEMO Instance
      if: inputs.deploy_demo == true
      env:
        S3_BUCKET: fiscalismia-infrastructure
        S3_PREFIX: pki
        ROOT_CA_PUB_KEY: root-ca.pem
        ROOT_CA_FINGERPRINT: root-ca.fingerprint
        INTERMEDIATA_CA_PUB_KEY: intermediate-ca.pem
        SECRET_INTERMEDIATE_CA_KEY: intermediate-ca-key.enc
        SECRET_INTERMEDIATE_CA_KEY_PW: intermediate_ca_key_password
      run: |
        ### INFRA SETUP
        scp ${INFRA_DIR}/docker-compose.demo.instance.yml demo:${REMOTE_DEMO_DIR}/docker-compose.yml
        scp ${INFRA_DIR}/docker-compose.pki.yml demo:${REMOTE_DEMO_DIR}/

        ### FRONTEND SETUP
        scp ${FRONTEND_DIR}/Dockerfile demo:${REMOTE_DEMO_DIR}/frontend/Dockerfile

        ### BACKEND SETUP
        scp ${BACKEND_DIR}/Dockerfile demo:${REMOTE_DEMO_DIR}/backend/Dockerfile
        scp ${BACKEND_DIR}/public/favicon.ico demo:${REMOTE_DEMO_DIR}/backend/public/favicon.ico
        # copy favicon and make nodejs owner of public dir
        ssh demo "chown -R 1001:1001 ${REMOTE_DEMO_DIR}/backend/public/"

        ### FASTAPI SETUP
        scp ${FASTAPI_DIR}/Dockerfile demo:${REMOTE_DEMO_DIR}/fastapi/Dockerfile

        ### PKI CERTIFICATE AUTHORITY SETUP
        ssh demo "mkdir -p /tmp/pki/"

        # Fetch Secrets and Public Keys from AWS
        aws s3 cp s3://${S3_BUCKET}/${S3_PREFIX}/${ROOT_CA_PUB_KEY} .
        aws s3 cp s3://${S3_BUCKET}/${S3_PREFIX}/${ROOT_CA_FINGERPRINT} .
        aws s3 cp s3://${S3_BUCKET}/${S3_PREFIX}/${INTERMEDIATA_CA_PUB_KEY} .
        aws ssm get-parameter \
          --region ${{ vars.AWS_REGION }} \
          --name /pki/${SECRET_INTERMEDIATE_CA_KEY} \
          --with-decryption \
          --query Parameter.Value \
          --output text \
          >> ./${SECRET_INTERMEDIATE_CA_KEY}
        aws ssm get-parameter \
          --region ${{ vars.AWS_REGION }} \
          --name /pki/${SECRET_INTERMEDIATE_CA_KEY_PW} \
          --with-decryption \
          --query Parameter.Value \
          --output text \
          >> ./${SECRET_INTERMEDIATE_CA_KEY_PW}
        scp \
          ${ROOT_CA_PUB_KEY} \
          ${ROOT_CA_FINGERPRINT} \
          ${INTERMEDIATA_CA_PUB_KEY} \
          ${SECRET_INTERMEDIATE_CA_KEY} \
          ${SECRET_INTERMEDIATE_CA_KEY_PW} \
          demo:/tmp/pki/
        # Cleanup Secrets and Public Keys from Runner Workspace
        rm -f ./${ROOT_CA_PUB_KEY} \
          ./${ROOT_CA_FINGERPRINT} \
          ./${INTERMEDIATA_CA_PUB_KEY} \
          ./${SECRET_INTERMEDIATE_CA_KEY} \
          ./${SECRET_INTERMEDIATE_CA_KEY_PW}
        scp \
          ${INFRA_DIR}/pki/03_setup_hetzner_vm.sh \
          ${INFRA_DIR}/pki/04_generate_end_entity_certs.sh \
          ${INFRA_DIR}/pki/05_aws_sts_credential_req.sh \
          ${INFRA_DIR}/pki/06_shred_env_secrets.sh \
          demo:${REMOTE_DEMO_DIR}/scripts/
        ssh demo << EOF
          cd ${REMOTE_DEMO_DIR}/scripts/
          chmod u+x 03_setup_hetzner_vm.sh
          chmod u+x 04_generate_end_entity_certs.sh
          chmod u+x 05_aws_sts_credential_req.sh
          chmod u+x 06_shred_env_secrets.sh
        EOF

        ### DATABASE SETUP
        scp ${BACKEND_DIR}/database/Dockerfile demo:${REMOTE_DEMO_DIR}/database/Dockerfile
        scp \
          ${BACKEND_DIR}/database/pgsql-public-ddl.sql \
          ${BACKEND_DIR}/database/pgsql-user-ddl.sql \
          ${BACKEND_DIR}/database/pgsql-demo-dml.sql \
          ${BACKEND_DIR}/database/pgsql-local-initdb.sh \
          demo:${REMOTE_DEMO_DIR}/database/
    - name: Setup DEMO Instance /w PKI for IAM Roles Anywhere
      if: inputs.deploy_demo == true
      env:
        TRUST_ANCHOR_ARN: arn:aws:rolesanywhere:eu-central-1:010928217051:trust-anchor/c3c0f28b-7779-4acb-b698-87e72a46b9db
        PROFILE_ARN: arn:aws:rolesanywhere:eu-central-1:010928217051:profile/f0e050f8-2e78-411d-8c39-a2938475fbf5
        ROLE_ARN: arn:aws:iam::010928217051:role/HetznerPKI-Secret-Retrieval-Role
        SECRET_ID: fiscalismia-backend/.env
        TARGET_ENV: demo
      run: |
        ssh demo "ls -Rhla ${REMOTE_DEMO_DIR}/"
        echo "=== Executing initial PKI Setup Script ==="
        ssh demo "${REMOTE_DEMO_DIR}/scripts/03_setup_hetzner_vm.sh"
        echo "=== Running step-ca container ==="
        ssh demo << EOF
          cd ${REMOTE_DEMO_DIR}
          docker compose -f docker-compose.pki.yml down --volumes --remove-orphans || true
          docker compose -f docker-compose.pki.yml up --build --detach
          sleep 5
          curl --insecure https://localhost:9000/health
        EOF
        echo "=== Creating end-entity cert ==="
        ssh demo "${REMOTE_DEMO_DIR}/scripts/04_generate_end_entity_certs.sh"
        echo "=== Getting AWS STS Credential ==="
        ssh demo "${REMOTE_DEMO_DIR}/scripts/05_aws_sts_credential_req.sh ${TRUST_ANCHOR_ARN} ${PROFILE_ARN} ${ROLE_ARN} ${SECRET_ID} ${TARGET_ENV}"
        echo "=== Stopping PKI container after Credential retrieval ==="
        ssh demo "docker compose -f ${REMOTE_DEMO_DIR}/docker-compose.pki.yml down --volumes --remove-orphans || true"
    - name: Deploy on DEMO Instance via OpenSSH
      if: inputs.deploy_demo == true
      run: |
        ssh demo "ls -Rhla ${REMOTE_DEMO_DIR}/"
        ssh demo << EOF
          cd ${REMOTE_DEMO_DIR}
          docker compose down --volumes --remove-orphans || true
          docker compose up --build --detach
          echo "Waiting for backend healthcheck..."
          timeout 60 sh -c '
            until [ "\$(podman inspect --format="{{.State.Health.Status}}" fiscalismia-backend)" = "healthy" ]; do
              sleep 2
            done
          '
        EOF
        echo "=== Shredding .env file following deployment ==="
        ssh demo "${REMOTE_DEMO_DIR}/scripts/06_shred_env_secrets.sh"
    #     __        __        ___       __      __   ___  __        __             ___      ___
    #    |__)  /\  /  ` |__/ |__  |\ | |  \    |  \ |__  |__) |    /  \ \ /  |\/| |__  |\ |  |
    #    |__) /~~\ \__, |  \ |___ | \| |__/    |__/ |___ |    |___ \__/  |   |  | |___ | \|  |

    - name: Deploy BACKEND Production Instance via OpenSSH
      if: inputs.deploy_backend == true
      run: |
        echo "Deploying on Backend Instance"

    #     ___  __   __       ___  ___       __      __   ___  __        __             ___      ___
    #    |__  |__) /  \ |\ |  |  |__  |\ | |  \    |  \ |__  |__) |    /  \ \ /  |\/| |__  |\ |  |
    #    |    |  \ \__/ | \|  |  |___ | \| |__/    |__/ |___ |    |___ \__/  |   |  | |___ | \|  |

    - name: Deploy FRONTEND Production Instance via OpenSSH
      if: inputs.deploy_frontend == true
      run: |
        echo "Deploying on Frontend Instance"