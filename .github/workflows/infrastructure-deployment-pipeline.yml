name: Infrastructure Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      deploy_haproxy:
        description: 'Deploy HAProxy on Loadbalancer Instance'
        required: true
        default: true
        type: boolean
      deploy_go_healthcheck:
        description: 'Deploy Go Healthcheck Binary on Monitoring Instance'
        required: true
        default: false
        type: boolean
      deploy_prometheus_grafana:
        description: 'Deploy PROMETHEUS & GRAFANA on Monitoring Instance'
        required: true
        default: false
        type: boolean

jobs:
  infrastructure-deployment:
    runs-on: ubuntu-latest

    permissions:
      id-token: write # for aws OIDC STS tokens to work
      contents: read
      actions: read

    steps:
    - name: Checkout Fiscalismia-Infrastructure Repository
      uses: actions/checkout@v5
      # https://github.com/actions/checkout
      with:
        path: fiscalismia-infrastructure

    - name: Checkout Fiscalismia-Loadbalancer Repository
      uses: actions/checkout@v5
      # https://github.com/actions/checkout
      with:
        repository: fiscalismia/fiscalismia-loadbalancer
        path: fiscalismia-loadbalancer

    - name: Checkout Fiscalismia-Monitoring Repository
      uses: actions/checkout@v5
      # https://github.com/actions/checkout
      with:
        repository: fiscalismia/fiscalismia-monitoring
        path: fiscalismia-monitoring

    - name: Configure AWS Credentials with OIDC JWT Token for STS Access to Hcloud Backend Role
      uses: aws-actions/configure-aws-credentials@v5.1.1
      # https://github.com/aws-actions/configure-aws-credentials
      with:
        role-to-assume: arn:aws:iam::010928217051:role/OpenID_Connect_GithubActions_TerraformHcloudDeploymentAccess
        role-session-name: HcloudInfrastructureDeployment_STSSession
        aws-region: ${{ vars.AWS_REGION }}

    - name: Query SSH private keys for Hcloud servers from AWS Secrets Manager
      env:
        SSH_KEY_SECRET_ID: fiscalismia-ssh-keys-hcloud
        MASTER_PRIVATE_KEY: fiscalismia-infrastructure-master-key-hcloud
        LOADBALANCER_PRIVATE_KEY: fiscalismia-loadbalancer-instance-key-hcloud
        NAT_GATEWAY_PRIVATE_KEY: fiscalismia-nat-gateway-instance-key-hcloud
        MONITORING_PRIVATE_KEY: fiscalismia-monitoring-instance-key-hcloud
      run: |
        set -euo pipefail

        echo "Starting ssh-agent and exporting environment variables"
        eval "$(ssh-agent -s)"
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

        query_aws_plaintext_secret() {
          echo "Querying $1 key from AWS Secret $SSH_KEY_SECRET_ID"
          # INFO: sed escapes and replaces literal newlines
          # since the ssh-keys are saved as is without json escapes
          aws secretsmanager get-secret-value \
            --secret-id $SSH_KEY_SECRET_ID \
            --output text \
            --query SecretString \
            | sed ':a;N;$!ba;s/\n/\\n/g' \
            | jq -r --arg key "$1" '.[$key]' \
            | ssh-add - > /dev/null 2>&1
        }

        query_aws_plaintext_secret ${MASTER_PRIVATE_KEY}
        query_aws_plaintext_secret ${LOADBALANCER_PRIVATE_KEY}
        query_aws_plaintext_secret ${NAT_GATEWAY_PRIVATE_KEY}
        query_aws_plaintext_secret ${MONITORING_PRIVATE_KEY}

    - name: Extract Hcloud Server IP Adresses from Remote State
      env:
        S3_BUCKET: hangrybear-tf-backend-state-bucket
        S3_PREFIX: fiscalismia-infrastructure/hcloud
        S3_KEY: state.tfstate
      run : |
        aws s3 cp s3://${S3_BUCKET}/${S3_PREFIX}/${S3_KEY} .

        bastion_ip=$(cat state.tfstate | jq -r .outputs.fiscalismia_bastion_host_ipv4.value )
        lb_ip=$(cat state.tfstate | jq -r .outputs.fiscalismia_loadbalancer_private_ipv4.value )
        monitor_ip=$(cat state.tfstate | jq -r .outputs.fiscalismia_monitoring_private_ipv4.value )

        echo "BASTION_HOST_PUBLIC_IP=$bastion_ip" >> $GITHUB_ENV
        echo "LOADBALANCER_PRIVATE_IP=$lb_ip" >> $GITHUB_ENV
        echo "MONITORING_INSTANCE_PRIVATE_IP=$monitor_ip" >> $GITHUB_ENV

    - name: Create SSH Config for Bastion-Host ProxyJump
      run: |
        mkdir -p ~/.ssh/
        cat << EOF > ~/.ssh/config
        Host bastion-host
            HostName $BASTION_HOST_PUBLIC_IP
            User root
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

        Host loadbalancer
            HostName $LOADBALANCER_PRIVATE_IP
            User root
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion-host

        Host monitoring
            HostName $MONITORING_INSTANCE_PRIVATE_IP
            User root
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyJump bastion-host
        EOF

        chmod 600 ~/.ssh/config

    - name: Prepare Runner Workspace for Deployment
      env:
        REMOTE_HAPROXY_DIR: /usr/local/etc/haproxy
        REMOTE_MONITORING_DIR: /usr/local/etc/fiscalismia-monitoring
      run: |
        echo "REMOTE_HAPROXY_DIR=$REMOTE_HAPROXY_DIR" >> $GITHUB_ENV
        echo "REMOTE_MONITORING_DIR=$REMOTE_MONITORING_DIR" >> $GITHUB_ENV
        echo "MONITORING_DIR=${GITHUB_WORKSPACE}/fiscalismia-monitoring" >> $GITHUB_ENV
        echo "LOADBALANCER_DIR=${GITHUB_WORKSPACE}/fiscalismia-loadbalancer" >> $GITHUB_ENV
        echo "INFRA_DIR=${GITHUB_WORKSPACE}/fiscalismia-infrastructure" >> $GITHUB_ENV

    - name: Deploy HAProxy LOADBALANCER via OpenSSH
      env:
        PRIVATE_NETWORK_INTERFACE: 172.24.1.3
      if: inputs.deploy_haproxy == true
      run: |
        # SETUP REMOTE WORKSPACE FOR HAPROXY
        ssh loadbalancer << EOF
          mkdir -p ${REMOTE_HAPROXY_DIR}
          mkdir -p ${REMOTE_HAPROXY_DIR}/scripts
        EOF
        scp ${LOADBALANCER_DIR}/docker-compose.yml loadbalancer:${REMOTE_HAPROXY_DIR}/
        ssh loadbalancer "cp /root/scripts/colorized-haproxy-logging.sh ${REMOTE_HAPROXY_DIR}/scripts/"

        # Give loadbalancer temporary internet access until reboot for pulling haproxy image
        ssh loadbalancer << EOF
          timeout 2 curl -s ifconfig.me
          exit_code=\$?
          # only execute if curl times out
          if (( \$exit_code > 0 )); then
            printf "\nSetting up ephemeral internet access via NAT GW\n"
            /root/scripts/nat_gw_ephemeral_public_egress.sh $PRIVATE_NETWORK_INTERFACE
            cat /root/nat_gw_egress_setup.log
          else
            printf "\nInternet Access already setup. Continue.\n"
          fi
        EOF

        # Deploy latest container via docker compose
        ssh loadbalancer "ls -Rhla ${REMOTE_HAPROXY_DIR}/"
        ssh loadbalancer << EOF
          cd ${REMOTE_HAPROXY_DIR}
          docker compose down --volumes --remove-orphans || true
          docker compose up --detach
          echo "Waiting for haproxy healthcheck post image pull..."
          timeout 60 sh -c '
            until [ "\$(podman inspect --format="{{.State.Health.Status}}" haproxy)" = "healthy" ]; do
              sleep 2
            done
          '
          # enables podman to honor the restart policy after reboot
          sudo systemctl enable podman-restart.service
        EOF

        echo "Rebooting loadbalancer to remove ephemeral internet access..."
        ssh loadbalancer "sudo systemctl reboot" || true
        echo "Waiting for loadbalancer to come back online..."
        sleep 30
        for i in $(seq 1 12); do
          echo "SSH connectivity probe attempt $i..."
          ssh -o ConnectTimeout=5 loadbalancer "podman ps --format '{{.Names}} {{.Status}}'" && break
          sleep 10
        done
        ssh loadbalancer << EOF
          echo "Waiting for haproxy healthcheck post reboot..."
          timeout 60 sh -c '
            until [ "\$(podman inspect --format="{{.State.Health.Status}}" haproxy)" = "healthy" ]; do
              sleep 2
            done
          '
        EOF

        echo "=== For human readable colored haproxy ingress logs run below cmd ==="
        echo "ssh loadbalancer ${REMOTE_HAPROXY_DIR}/scripts/colorized-haproxy-logging.sh"

    - name: Deploy Go Healthcheck Binary on Monitoring Instance via OpenSSH
      if: inputs.deploy_go_healthcheck == true
      run: |
        echo "Deploying Go Healthcheck Binary on Monitoring Instance"

    - name: Deploy PROMETHEUS & GRAFANA on Monitoring Instance via OpenSSH
      if: inputs.deploy_prometheus_grafana == true
      run: |
        echo "Deploying Prometheus & Grafana on Monitoring Instance"
