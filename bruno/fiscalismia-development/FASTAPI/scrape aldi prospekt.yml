info:
  name: scrape aldi prospekt
  type: http
  seq: 6

http:
  method: POST
  url: "{{PROTOCOL}}://{{FASTAPI_ENDPOINT}}/fastapi/fiscalismia/rest/cdp/scrape/supermarket/aldi_prospekt"
  body:
    type: json
    data: '{ "url": "https://www.aldi-sued.de/prospekte" }'
  auth:
    type: bearer
    token: "{{JWT_SESSION_TOKEN}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const sessionId = res.body?.session_id;
            if (sessionId) {
              bru.setVar("SESSION_ID", sessionId);
            }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
