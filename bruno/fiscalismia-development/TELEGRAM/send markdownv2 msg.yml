info:
  name: send markdownv2 msg
  type: http
  seq: 2

http:
  method: POST
  url: https:/api.telegram.org/bot{{TELEGRAM_API_TOKEN}}/sendMessage
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "chat_id": "{{TELEGRAM_CHAT_ID}}",
        "parse_mode": "MarkdownV2",
        "text": "\\# GITHUB ACTIONS MULTILINE MARKDOWNV2\n*bold \\*text*\n_italic \\*text_\n__underline__\n~strikethrough~\n||spoiler||\n*bold _italic bold ~italic bold strikethrough ||italic bold strikethrough spoiler||~ __underline italic bold___ bold*\n[inline URL](http://www.example.com/)\n[inline mention of a user](tg://user?id=123456789)\n![](tg://emoji?id=5368324170671202286)\n![22:45 tomorrow](tg://time?unix=1647531900&format=wDT)\n![22:45 tomorrow](tg://time?unix=1647531900&format=t)\n![22:45 tomorrow](tg://time?unix=1647531900&format=r)\n![22:45 tomorrow](tg://time?unix=1647531900)\n`inline fixed-width code`\n```\npre-formatted fixed-width code block\n```\n```python\npre-formatted fixed-width code block written in the Python programming language\n```\n>Block quotation started\n>Block quotation continued\n>Block quotation continued\n>Block quotation continued\n>The last line of the block quotation\n**>The expandable block quotation started right after the previous block quotation\n>It is separated from the previous block quotation by an empty bold entity\n>Expandable block quotation continued\n>Hidden by default part of the expandable block quotation started\n>Expandable block quotation continued\n>The last line of the expandable block quotation with the expandability mark||\n"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
